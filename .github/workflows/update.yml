# .github/workflows/update.yml
name: Update hockey feeds

on:
  schedule:
    - cron: '0 4 * * *'   # 05:00 CET / 06:00 CEST — daily refresh
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data and generate feeds
        run: node scripts/fetch-and-generate.js

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/teams.json feeds/
          git diff --staged --quiet || git commit -m "chore: update feeds $(date -u +%Y-%m-%d)"
          git push
